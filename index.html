<!DOCTYPE html>
<html>

<head>
<title>Profile Card Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Profile Card Generator</h1>
<button id="darkModeBtn">Toggle Dark Mode</button>


<div class="container">

<div class="form">

<input id="name" placeholder="Enter Name">
<input id="role" placeholder="Enter Role">
<textarea id="bio" placeholder="Enter Bio"></textarea>
<input id="githubInput" placeholder="GitHub URL">

<input id="linkedinInput" placeholder="LinkedIn URL">

<input id="twitterInput" placeholder="Twitter URL">

<input id="image" placeholder="Image URL">

</div>

<div class="preview">

<div id="card" class="card">

<div class="social-links">

<a id="githubLink" target="_blank">GitHub</a>

<a id="linkedinLink" target="_blank">LinkedIn</a>

<a id="twitterLink" target="_blank">Twitter</a>

</div>

<img id="preview-img" src="https://via.placeholder.com/120">

<h2 id="preview-name">Your Name</h2>

<h4 id="preview-role">Your Role</h4>

<p id="preview-bio">Your bio appears here</p>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
